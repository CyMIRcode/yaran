<article>
    <a href="{{ .RelPermalink }}">
        <div class="article-details">
            <h2 class="article-title">{{- .Title -}}</h2>
            <footer class="article-meta">
                {{ if not .Date.IsZero }}
                    <time>{{ .Date.Format "2006-01-02" }}</time>
                {{ end }}
            </footer>
        </div>

        <div class="article-image">
            {{/* 彻底删掉所有 readDir 代码，直接写死一个现成的图片路径测试 */}}
            <img src="/thumbnails/a.webp" alt="{{ .Title }}" width="60" height="60" style="object-fit: cover; border-radius: 8px;">
        </div>
    </a>
</article>
